name: Build, Push and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }} # Ensure this secret holds your personal access token!

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./E-COMMERCE/Backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./E-COMMERCE/shoppingstore
          push: true
          tags: ${{ secrets.bilalafzalbhatti }}/shopping_store:${{ github.sha }} # Updated to match your verified repo name

      - name: Build and push Admin
        uses: docker/build-push-action@v5
        with:
          context: ./admin-cms
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-admin:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ecommerce-cluster --region us-east-1

      - name: Deploy to EKS
        run: |
          # 1. Update images for all three deployments inside EKS
          kubectl set image deployment/ecommerce-backend \
            backend=${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:${{ github.sha }}
          
          kubectl set image deployment/ecommerce-frontend \
            frontend=${{ secrets.bilalafzalbhatti }}/shopping_store:${{ github.sha }}
          
          kubectl set image deployment/ecommerce-admin \
            admin=${{ secrets.DOCKER_USERNAME }}/ecommerce-admin:${{ github.sha }}
          
          # 2. Monitor rolling updates to confirm zero-downtime success
          kubectl rollout status deployment/ecommerce-backend
          kubectl rollout status deployment/ecommerce-frontend
          kubectl rollout status deployment/ecommerce-admin