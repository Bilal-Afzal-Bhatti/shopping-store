# k8s/frontend-deployment.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-frontend
  template:
    metadata:
      labels:
        app: ecommerce-frontend
    spec:
      containers:
      - name: frontend
        # Updated to point to your actual repository base image name
        image: shopping_store:latest 
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu:    "50m"
          limits:
            memory: "128Mi"
            cpu:    "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-frontend-service
spec:
  selector:
    app: ecommerce-frontend
  ports:
  - port:       80
    targetPort: 80
  type: LoadBalancer           # ✅ exposes to internet