apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shoppingstore-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    
    # 1. Instruct the ALB to open both Port 80 (HTTP) and Port 443 (HTTPS)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    
    # 2. Attach your newly issued SSL certificate
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:277876300047:certificate/e5caaf3d-8a16-4128-a872-ae5067b2de21
    
    # 3. Automatically force all non-secure HTTP traffic to secure HTTPS
    alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  ingressClassName: alb
  rules:
    - host: nexcuscart.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ecommerce-frontend-service
                port:
                  number: 80