apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-frontend-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:YOUR_ACCOUNT_ID:certificate/YOUR_ACM_CERT_ID
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    
    # 🔗 Group name merges separate ingress resources into ONE AWS ALB
    alb.ingress.kubernetes.io/group.name: "ecommerce-alb-group"
    alb.ingress.kubernetes.io/group.order: '2' # 👈 Processed after backend
spec:
  ingressClassName: alb
  rules:
    - host: nexcuscart.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ecommerce-frontend-service
                port:
                  number: 3000